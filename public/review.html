<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Hasil & Pembahasan</title>
        <link rel="stylesheet" href="/css/tokens.css" />
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
            async
        ></script>
    </head>
    <body>
        <div class="site-wrapper">
            <div class="container" style="max-width: 1400px; flex: 1">
                <div class="header">
                    <h1 class="app-title">📊 Hasil & Pembahasan</h1>
                    <button class="btn-back" onclick="location.href = '/'">
                        ← Halaman Utama
                    </button>
                </div>
                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                </div>
                <div
                    id="result-info"
                    class="review-header-info"
                    style="display: none"
                ></div>
                <div
                    id="review-body"
                    class="review-layout"
                    style="display: none"
                >
                    <section class="review-question-section">
                        <div class="question-container">
                            <div class="question-no" id="question-no"></div>
                            <div
                                class="question-content"
                                id="question-content"
                            ></div>
                            <div id="options-container"></div>
                            <div
                                id="explanation"
                                class="review-explanation"
                                style="display: none"
                            ></div>
                            <div class="question-nav">
                                <button class="btn-secondary" id="prev-btn">
                                    ← Sebelumnya
                                </button><span id="q-counter" style="color: var(--text-muted)"></span>
                                <button class="btn-secondary" id="next-btn">
                                    Selanjutnya →
                                </button>
                            </div>
                        </div>
                    </section>
                    <aside class="review-answer-panel answer-panel">
                        <h3>📋 Hasil Jawaban</h3>
                        <div class="answer-grid" id="answer-grid"></div>
                    </aside>
                </div>
            </div>
            <footer class="footer">
                Untuk latihan SKD (Seleksi Kompetensi Dasar) · Made with ♥️ in
                2026
            </footer>
        </div>
        <script src="/js/review.js"></script>
    </body>
</html>
