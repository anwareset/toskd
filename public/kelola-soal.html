<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Kelola Bank Soal</title>
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
            async
        ></script>
    </head>
    <body>
        <div class="container" style="max-width: 1300px">
            <div class="header">
                <h1 class="app-title">📄 Kelola Bank Soal</h1>
                <div>
                    <button class="btn-primary" id="add-q-btn">
                        ➕ Tambah Soal Baru
                    </button>
                    <button
                        class="btn-secondary"
                        onclick="location.href = '/bank-soal.html'"
                    >
                        Kembali
                    </button>
                </div>
            </div>

            <div id="loading" class="loading-overlay">
                <div class="spinner"></div>
            </div>

            <table id="questions-table" style="display: none">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Konten Soal (Preview)</th>
                        <th>Tipe</th>
                        <th>Gambar</th>
                        <th>Kunci Jawaban</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="questions-body"></tbody>
            </table>

            <dialog id="q-modal" class="modal" style="max-width: 800px">
                <div class="modal-content">
                    <h3 id="modal-title">Tambah Soal</h3>

                    <div class="tab-nav">
                        <button class="tab-btn active" data-tab="tab-content">
                            Konten Soal
                        </button>
                        <button class="tab-btn" data-tab="tab-options">
                            Opsi Jawaban
                        </button>
                        <button class="tab-btn" data-tab="tab-explanation">
                            Pembahasan
                        </button>
                        <button class="tab-btn" data-tab="tab-preview">
                            Preview
                        </button>
                    </div>

                    <form id="q-form" class="cms-form">
                        <input type="hidden" id="q-id" />

                        <!-- Tab 1: Konten Soal -->
                        <div id="tab-content" class="tab-content active">
                            <div class="form-group">
                                <label>Tipe Soal</label>
                                <div
                                    style="
                                        display: flex;
                                        gap: 16px;
                                        margin-top: 6px;
                                    "
                                >
                                    <label
                                        style="font-weight: normal; margin: 0"
                                        ><input
                                            type="radio"
                                            name="q-type"
                                            value="text"
                                            checked
                                        />
                                        Teks biasa</label
                                    >
                                    <label
                                        style="font-weight: normal; margin: 0"
                                        ><input
                                            type="radio"
                                            name="q-type"
                                            value="math"
                                        />
                                        Matematika (MathJax)</label
                                    >
                                    <label
                                        style="font-weight: normal; margin: 0"
                                        ><input
                                            type="radio"
                                            name="q-type"
                                            value="figural"
                                        />
                                        Bergambar (Figural)</label
                                    >
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="q-content-text"
                                    >Teks / Pertanyaan</label
                                >
                                <textarea
                                    id="q-content-text"
                                    class="input-field"
                                    placeholder="Tuliskan pertanyaan... Matematika: gunakan $$...$$"
                                ></textarea>
                            </div>
                            <div
                                class="form-group"
                                id="image-group"
                                style="display: none"
                            >
                                <label for="q-image"
                                    >Upload Gambar (Untuk Figural)</label
                                >
                                <input
                                    type="file"
                                    id="q-image"
                                    class="input-field"
                                    accept="image/*"
                                />
                                <div
                                    id="image-preview"
                                    class="preview-box"
                                    style="display: none; text-align: center"
                                ></div>
                                <input type="hidden" id="existing-image-url" />
                            </div>
                        </div>

                        <!-- Tab 2: Opsi Jawaban -->
                        <div id="tab-options" class="tab-content">
                            <p
                                style="
                                    color: #64748b;
                                    font-size: 0.85rem;
                                    margin-bottom: 12px;
                                "
                            >
                                Isi semua opsi dan pilih 1 kunci jawaban benar
                            </p>
                            <div class="form-group">
                                <label for="opt-a">Opsi A</label
                                ><input
                                    type="text"
                                    id="opt-a"
                                    class="input-field"
                                />
                            </div>
                            <div class="form-group">
                                <label for="opt-b">Opsi B</label
                                ><input
                                    type="text"
                                    id="opt-b"
                                    class="input-field"
                                />
                            </div>
                            <div class="form-group">
                                <label for="opt-c">Opsi C</label
                                ><input
                                    type="text"
                                    id="opt-c"
                                    class="input-field"
                                />
                            </div>
                            <div class="form-group">
                                <label for="opt-d">Opsi D</label
                                ><input
                                    type="text"
                                    id="opt-d"
                                    class="input-field"
                                />
                            </div>
                            <div class="form-group">
                                <label for="opt-e">Opsi E</label
                                ><input
                                    type="text"
                                    id="opt-e"
                                    class="input-field"
                                />
                            </div>
                            <div class="form-group">
                                <label>Kunci Jawaban Benar</label>
                                <select
                                    id="correct-ans"
                                    class="input-field"
                                    style="margin-top: 6px"
                                >
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                    <option value="E">E</option>
                                </select>
                            </div>
                        </div>

                        <!-- Tab 3: Pembahasan -->
                        <div id="tab-explanation" class="tab-content">
                            <div class="form-group">
                                <label for="q-explanation"
                                    >Pembahasan Cara Pengerjaan</label
                                >
                                <textarea
                                    id="q-explanation"
                                    class="input-field"
                                    placeholder="Tuliskan langkah penyelesaian..."
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <label for="q-explanation-image"
                                    >Upload Gambar Pembahasan (Opsional)</label
                                >
                                <input
                                    type="file"
                                    id="q-explanation-image"
                                    class="input-field"
                                    accept="image/*"
                                />
                                <div
                                    id="explanation-image-preview"
                                    class="preview-box"
                                    style="
                                        display: none;
                                        text-align: center;
                                        margin-top: 12px;
                                    "
                                ></div>
                                <input
                                    type="hidden"
                                    id="existing-explanation-image-url"
                                />
                            </div>
                        </div>

                        <!-- Tab 4: Preview -->
                        <div id="tab-preview" class="tab-content">
                            <div class="form-group">
                                <label
                                    >Pratinjau Soal (Format MathJax &
                                    Gambar)</label
                                >
                                <div
                                    id="preview-render-area"
                                    style="
                                        padding: 16px;
                                        background: #fff;
                                        border: 1px solid #e2e8f0;
                                        border-radius: 8px;
                                        min-height: 100px;
                                        margin-top: 8px;
                                        overflow-y: auto;
                                        max-height: 300px;
                                    "
                                ></div>
                            </div>
                        </div>

                        <div class="modal-buttons">
                            <button
                                type="button"
                                class="btn-secondary"
                                id="close-modal-btn"
                            >
                                Batal
                            </button>
                            <button type="submit" class="btn-primary">
                                Simpan Soal
                            </button>
                        </div>
                    </form>
                </div>
            </dialog>
        </div>
        <script src="/js/kelola-soal.js"></script>
    </body>
</html>
