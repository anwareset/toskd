<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Kelola Bank Soal</title>
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
        <link
            rel="stylesheet"
            href="https://cdn.quilljs.com/1.3.7/quill.snow.css"
        />
        <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
            async
        ></script>
        <style>
            /* Quill inside modal fixes */
            .quill-editor {
                background: var(--surface);
                border-radius: 0 0 8px 8px;
            }
            .quill-editor .ql-toolbar.ql-snow {
                border-radius: 8px 8px 0 0;
                border-color: var(--border);
                background: var(--surface-header);
            }
            .quill-editor .ql-container.ql-snow {
                border-color: var(--border);
                border-radius: 0 0 8px 8px;
                color: var(--text);
                min-height: 80px;
            }
            .quill-editor .ql-editor {
                min-height: 80px;
                color: var(--text);
            }
            .quill-editor .ql-editor.ql-blank::before {
                color: var(--text-muted);
                font-style: normal;
                content: attr(data-placeholder);
            }
            .quill-editor .ql-editor p {
                margin-bottom: 0.5em;
            }
            /* Option editors: compact */
            .editor-option .quill-editor {
                min-height: auto;
            }
            .editor-option .ql-editor {
                min-height: 36px;
                padding: 6px 12px;
            }
            /* Dark mode Quill */
            [data-theme="dark"] .quill-editor .ql-toolbar.ql-snow .ql-stroke {
                stroke: var(--text-muted);
            }
            [data-theme="dark"] .quill-editor .ql-toolbar.ql-snow .ql-fill {
                fill: var(--text-muted);
            }
            [data-theme="dark"] .quill-editor .ql-toolbar.ql-snow .ql-picker {
                color: var(--text-muted);
            }
            [data-theme="dark"]
                .quill-editor
                .ql-toolbar.ql-snow
                .ql-picker-label {
                color: var(--text-muted);
            }
            [data-theme="dark"]
                .quill-editor
                .ql-toolbar.ql-snow
                button:hover
                .ql-stroke {
                stroke: var(--primary);
            }
            [data-theme="dark"]
                .quill-editor
                .ql-toolbar.ql-snow
                .ql-active
                .ql-stroke {
                stroke: var(--primary);
            }
            [data-theme="dark"] .quill-editor .ql-toolbar.ql-snow .ql-active {
                color: var(--primary);
            }
            .form-group {
                margin-bottom: 16px;
            }
            .form-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 6px;
                font-size: 0.9rem;
            }
            .input-field {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--surface);
                color: var(--text);
                font-size: 0.95rem;
                box-sizing: border-box;
            }
            .input-field:focus {
                outline: 2px solid var(--primary);
                border-color: transparent;
            }
            .cms-form select.input-field {
                appearance: auto;
            }
            /* Placeholder for Quill editor */
            .ql-editor[data-placeholder]:empty::before {
                color: var(--text-muted);
            }
        </style>
    </head>
    <body>
        <div class="site-wrapper">
            <div class="container" style="max-width: 1300px; flex: 1">
                <div class="header">
                    <h1 class="app-title">📄 Kelola Bank Soal</h1>
                    <div>
                        <button class="btn-primary" id="add-q-btn">
                            ➕ Tambah Soal Baru
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="location.href = '/bank-soal.html'"
                        >
                            Kembali
                        </button>
                    </div>
                </div>

                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                </div>

                <!-- Top Pagination & Search Controls -->
                <div
                    class="table-controls"
                    id="controls-top"
                    style="
                        display: none;
                        justify-content: space-between;
                        align-items: center;
                        margin: 16px 0;
                        flex-wrap: wrap;
                        gap: 12px;
                    "
                >
                    <div style="display: flex; align-items: center; gap: 8px">
                        <label for="rows-per-page-top">Tampilkan:</label>
                        <select
                            id="rows-per-page-top"
                            style="
                                padding: 6px 12px;
                                border: 1px solid var(--border);
                                border-radius: 6px;
                                background: var(--surface);
                                color: var(--text);
                                font-size: 0.9rem;
                            "
                        >
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span>baris</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px">
                        <input
                            type="text"
                            id="search-input"
                            placeholder="Cari soal..."
                            style="
                                padding: 6px 12px;
                                border: 1px solid var(--border);
                                border-radius: 6px;
                                background: var(--surface);
                                color: var(--text);
                                font-size: 0.9rem;
                                width: 280px;
                            "
                        />
                        <button
                            class="btn-secondary"
                            id="prev-page-btn-top"
                            style="padding: 6px 12px; border-radius: 6px"
                        >
                            Sebelumnya
                        </button>
                        <span
                            id="page-info-top"
                            style="font-size: 0.9rem; color: var(--text-muted)"
                            >Halaman 1 dari 1</span
                        >
                        <button
                            class="btn-secondary"
                            id="next-page-btn-top"
                            style="padding: 6px 12px; border-radius: 6px"
                        >
                            Selanjutnya
                        </button>
                    </div>
                </div>

                <table id="questions-table" style="display: none">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Konten Soal (Preview)</th>
                            <th>Tipe Soal</th>
                            <th>Kunci Jawaban</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="questions-body"></tbody>
                </table>

                <!-- Bottom Pagination Controls -->
                <div
                    class="table-controls"
                    id="controls-bottom"
                    style="
                        display: flex;
                        justify-content: flex-end;
                        align-items: center;
                        margin-top: 16px;
                        flex-wrap: wrap;
                        gap: 12px;
                    "
                >
                    <div style="display: flex; align-items: center; gap: 8px">
                        <label for="rows-per-page-bottom">Tampilkan:</label>
                        <select
                            id="rows-per-page-bottom"
                            style="
                                padding: 6px 12px;
                                border: 1px solid var(--border);
                                border-radius: 6px;
                                background: var(--surface);
                                color: var(--text);
                                font-size: 0.9rem;
                            "
                        >
                            <option value="10">10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px">
                        <button
                            class="btn-secondary"
                            id="prev-page-btn-bottom"
                            style="padding: 6px 12px; border-radius: 6px"
                        >
                            Sebelumnya
                        </button>
                        <span
                            id="page-info-bottom"
                            style="font-size: 0.9rem; color: var(--text-muted)"
                            >Halaman 1 dari 1</span
                        >
                        <button
                            class="btn-secondary"
                            id="next-page-btn-bottom"
                            style="padding: 6px 12px; border-radius: 6px"
                        >
                            Selanjutnya
                        </button>
                    </div>
                </div>

                <dialog id="q-modal" class="modal" style="max-width: 800px">
                    <div class="modal-content">
                        <h3 id="modal-title">Tambah Soal</h3>

                        <div class="tab-nav">
                            <button
                                class="tab-btn active"
                                data-tab="tab-content"
                            >
                                Konten Soal
                            </button>
                            <button class="tab-btn" data-tab="tab-options">
                                Opsi Jawaban
                            </button>
                            <button class="tab-btn" data-tab="tab-explanation">
                                Pembahasan
                            </button>
                            <button class="tab-btn" data-tab="tab-preview">
                                Preview
                            </button>
                        </div>

                        <form id="q-form" class="cms-form">
                            <input type="hidden" id="q-id" />

                            <!-- Tab 1: Konten Soal -->
                            <div id="tab-content" class="tab-content active">
                                <div class="form-group">
                                    <label for="q-question-type"
                                        >Tipe Soal</label
                                    >
                                    <select
                                        id="q-question-type"
                                        class="input-field"
                                    >
                                        <optgroup label="TWK - Dasar Negara">
                                            <option value="TWK Pilar Negara">
                                                TWK Pilar Negara (Pancasila,
                                                UUD45, Bhinneka Tunggal Ika)
                                            </option>
                                            <option
                                                value="TWK Nilai Kebangsaan"
                                            >
                                                TWK Nilai Kebangsaan
                                                (Nasionalisme, Integritas, Bela
                                                Negara)
                                            </option>
                                            <option
                                                value="TWK Bahasa Indonesia"
                                            >
                                                TWK Bahasa Indonesia
                                            </option>
                                        </optgroup>
                                        <optgroup
                                            label="TIU - Inteligensia Umum"
                                        >
                                            <option value="TIU Verbal">
                                                TIU Verbal
                                            </option>
                                            <option value="TIU Numerik">
                                                TIU Numerik
                                            </option>
                                            <option value="TIU Figural">
                                                TIU Figural
                                            </option>
                                        </optgroup>
                                        <optgroup
                                            label="TKP - Karakteristik Pribadi"
                                        >
                                            <option
                                                value="TKP Pelayanan Publik"
                                            >
                                                TKP Pelayanan Publik
                                            </option>
                                            <option value="TKP Jejaring Kerja">
                                                TKP Jejaring Kerja
                                            </option>
                                            <option value="TKP Sosial Budaya">
                                                TKP Sosial Budaya
                                            </option>
                                            <option
                                                value="TKP Anti Radikalisme"
                                            >
                                                TKP Anti Radikalisme
                                            </option>
                                            <option value="TKP Profesionalisme">
                                                TKP Profesionalisme
                                            </option>
                                            <option value="TKP TIK">
                                                TKP TIK
                                            </option>
                                        </optgroup>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Teks / Pertanyaan</label>
                                    <div
                                        id="q-content-editor"
                                        class="quill-editor"
                                        data-placeholder="Tuliskan pertanyaan disini... Gunakan toolbar untuk memformat teks dan menyisipkan gambar."
                                    ></div>
                                    <textarea
                                        id="q-content-text"
                                        class="input-field"
                                        name="q-content-text"
                                        style="display: none"
                                    ></textarea>
                                </div>
                            </div>

                            <!-- Tab 2: Opsi Jawaban -->
                            <div id="tab-options" class="tab-content">
                                <p
                                    style="
                                        color: var(--text-muted);
                                        font-size: 0.85rem;
                                        margin-bottom: 12px;
                                    "
                                >
                                    Isi semua opsi dan pilih 1 kunci jawaban
                                    benar
                                </p>

                                <div class="form-group">
                                    <label>Opsi A</label>
                                    <div
                                        id="opt-a-editor"
                                        class="quill-editor editor-option"
                                        data-placeholder="Isi opsi A"
                                    ></div>
                                    <textarea
                                        id="opt-a"
                                        class="input-field"
                                        style="display: none"
                                    ></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Opsi B</label>
                                    <div
                                        id="opt-b-editor"
                                        class="quill-editor editor-option"
                                        data-placeholder="Isi opsi B"
                                    ></div>
                                    <textarea
                                        id="opt-b"
                                        class="input-field"
                                        style="display: none"
                                    ></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Opsi C</label>
                                    <div
                                        id="opt-c-editor"
                                        class="quill-editor editor-option"
                                        data-placeholder="Isi opsi C"
                                    ></div>
                                    <textarea
                                        id="opt-c"
                                        class="input-field"
                                        style="display: none"
                                    ></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Opsi D</label>
                                    <div
                                        id="opt-d-editor"
                                        class="quill-editor editor-option"
                                        data-placeholder="Isi opsi D"
                                    ></div>
                                    <textarea
                                        id="opt-d"
                                        class="input-field"
                                        style="display: none"
                                    ></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Opsi E</label>
                                    <div
                                        id="opt-e-editor"
                                        class="quill-editor editor-option"
                                        data-placeholder="Isi opsi E"
                                    ></div>
                                    <textarea
                                        id="opt-e"
                                        class="input-field"
                                        style="display: none"
                                    ></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Kunci Jawaban Benar</label>
                                    <select
                                        id="correct-ans"
                                        class="input-field"
                                        style="margin-top: 6px"
                                    >
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                        <option value="D">D</option>
                                        <option value="E">E</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Tab 3: Pembahasan -->
                            <div id="tab-explanation" class="tab-content">
                                <div class="form-group">
                                    <label>Pembahasan Cara Pengerjaan</label>
                                    <div
                                        id="q-explanation-editor"
                                        class="quill-editor"
                                        data-placeholder="Tuliskan langkah penyelesaian..."
                                    ></div>
                                    <textarea
                                        id="q-explanation"
                                        class="input-field"
                                        name="q-explanation"
                                        style="display: none"
                                    ></textarea>
                                </div>
                            </div>

                            <!-- Tab 4: Preview -->
                            <div id="tab-preview" class="tab-content">
                                <div class="form-group">
                                    <label>
                                        Pratinjau Soal (Format MathJax & Gambar)
                                    </label>
                                    <div
                                        id="preview-render-area"
                                        style="
                                            padding: 16px;
                                            background: var(--surface);
                                            border: 1px solid var(--border);
                                            border-radius: 8px;
                                            min-height: 100px;
                                            margin-top: 8px;
                                            overflow-y: auto;
                                            max-height: 300px;
                                        "
                                    ></div>
                                </div>
                            </div>

                            <div class="modal-buttons">
                                <button
                                    type="button"
                                    class="btn-secondary"
                                    id="close-modal-btn"
                                >
                                    Batal
                                </button>
                                <button type="submit" class="btn-primary">
                                    Simpan Soal
                                </button>
                            </div>
                        </form>
                    </div>
                </dialog>
            </div>
            <footer class="footer">
                Untuk latihan SKD (Seleksi Kompetensi Dasar) · Made with ♥️ in
                2026
            </footer>
        </div>
        <script src="/js/kelola-soal.js"></script>
    </body>
</html>
