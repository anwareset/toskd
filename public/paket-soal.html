<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <link rel="icon" href="/assets/toskd-emoticon.svg" type="image/svg+xml">
        <title>TOSKD</title>
        <link rel="stylesheet" href="/css/tokens.css" />
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
    </head>
    <body>
        <!-- client-side guard (admin-auth-spec.md §7.4) -->
        <script>
          (function () {
            // Fail-open banner shown when server is unreachable. Extracted to
            // helper so both the catch block (network error) AND the 5xx branch
            // can use it. Critical: don't redirect to login on 5xx — user might
            // be authenticated and the server is just temporarily down (Rev. 0.7).
            function showServerDownBanner() {
              const banner = document.createElement("div");
              banner.style.cssText =
                "position:fixed;top:0;left:0;right:0;padding:12px 16px;background:var(--danger);" +
                "color:white;text-align:center;z-index:99999;font-size:0.9rem;";
              banner.innerHTML =
                "⚠️ Server tidak dapat dijangkau. CMS tidak dapat dimuat." +
                " <button onclick=\"location.reload()\" style=\"margin-left:12px;background:white;color:var(--danger);" +
                "border:0;padding:4px 10px;border-radius:4px;cursor:pointer\">Coba lagi</button>";
              document.body.appendChild(banner);
              const main = document.querySelector(".site-wrapper");
              if (main) main.style.visibility = "hidden";
            }
            (async function () {
              try {
                const res = await fetch("/api/admin/me", { credentials: "same-origin" });
                if (res.status === 401) {
                  // Not authenticated → redirect to login
                  const next = encodeURIComponent(window.location.pathname + window.location.search);
                  window.location.replace(`/login.html?next=${next}`);
                } else if (!res.ok) {
                  // 5xx or other server error → fail-open banner, don't trap in login loop
                  showServerDownBanner();
                }
                // 2xx: authenticated, continue
              } catch (err) {
                // Network error → fail-open banner
                showServerDownBanner();
              }
            })();
          })();
        </script>
        <div class="site-wrapper">
            <div class="container container--wide" style="flex: 1">
                <div class="header">
                    <h1 class="app-title">📦 Kelola Paket Soal</h1>
                    <div>
                        <button class="btn-primary" id="add-pack-btn">
                            ➕ Tambah Paket Soal
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="location.href = '/bank-soal.html'"
                        >
                            Kembali
                        </button>
                    </div>
                </div>

                <!-- Top Pagination & Search Controls
                     (paket-soal-pagination-spec.md §10.1) -->
                <div
                    class="pagination-bar pagination-bar--precise"
                    id="controls-top"
                    style="display: none;"
                >
                    <div class="pagination-bar-left">
                        <label
                            for="rows-per-page-top"
                            class="pagination-label"
                            >Tampilkan:</label
                        >
                        <select
                            id="rows-per-page-top"
                            class="pagination-select"
                        >
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                        <span class="pagination-text">baris</span>
                    </div>
                    <div class="pagination-bar-center">
                        <input
                            type="text"
                            id="search-input"
                            class="pagination-search"
                            placeholder="Cari paket..."
                            aria-label="Cari paket soal berdasarkan nama"
                        />
                    </div>
                    <div class="pagination-bar-right">
                        <button
                            class="btn-secondary pagination-btn"
                            id="prev-page-btn-top"
                            type="button"
                        >
                            Sebelumnya
                        </button>
                        <span
                            id="page-info-top"
                            class="pagination-info"
                            aria-live="polite"
                            >Halaman 1 dari 1</span
                        >
                        <button
                            class="btn-secondary pagination-btn"
                            id="next-page-btn-top"
                            type="button"
                        >
                            Selanjutnya
                        </button>
                    </div>
                </div>

                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                </div>

                <div
                    class="table-scroll-wrapper"
                    role="region"
                    aria-label="Tabel daftar paket soal"
                    tabindex="0"
                >
                    <table id="pack-table" class="table-condensed" style="display: none">
                        <thead>
                            <tr>
                                <th class="sticky-col-left">No</th>
                                <th
                                    class="sortable"
                                    data-sort-column="name"
                                    tabindex="0"
                                    aria-sort="none"
                                >
                                    Nama Paket<span class="sort-indicator"></span>
                                </th>
                                <th
                                    class="sortable"
                                    data-sort-column="duration_minutes"
                                    tabindex="0"
                                    aria-sort="none"
                                >
                                    Durasi (Menit)<span class="sort-indicator"></span>
                                </th>
                                <th
                                    class="sortable"
                                    data-sort-column="passing_grade"
                                    tabindex="0"
                                    aria-sort="none"
                                >
                                    Passing Grade<span class="sort-indicator"></span>
                                </th>
                                <th
                                    class="sortable"
                                    data-sort-column="question_count"
                                    tabindex="0"
                                    aria-sort="none"
                                >
                                    Jumlah Soal<span class="sort-indicator"></span>
                                </th>
                                <th>Subtes</th>
                                <th class="sticky-col-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="pack-body"></tbody>
                    </table>
                </div>

                <p
                    id="empty-msg"
                    style="
                        display: none;
                        color: var(--text-muted);
                        text-align: center;
                        padding: 40px;
                    "
                ></p>

                <!-- Bottom Pagination Controls (no search input — match
                     the kelola-soal.html bottom-bar layout, which omits
                     search and centers rows-per-page + prev/next only).
                     Spec §10.1 -->
                <div
                    class="pagination-bar pagination-bar--bottom pagination-bar--precise"
                    id="controls-bottom"
                    style="display: none;"
                >
                    <div class="pagination-bar-left">
                        <label
                            for="rows-per-page-bottom"
                            class="pagination-label"
                            >Tampilkan:</label
                        >
                        <select
                            id="rows-per-page-bottom"
                            class="pagination-select"
                        >
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div class="pagination-bar-right">
                        <button
                            class="btn-secondary pagination-btn"
                            id="prev-page-btn-bottom"
                            type="button"
                        >
                            Sebelumnya
                        </button>
                        <span
                            id="page-info-bottom"
                            class="pagination-info"
                            aria-live="polite"
                            >Halaman 1 dari 1</span
                        >
                        <button
                            class="btn-secondary pagination-btn"
                            id="next-page-btn-bottom"
                            type="button"
                        >
                            Selanjutnya
                        </button>
                    </div>
                </div>

                <dialog id="pack-modal" class="modal">
                    <div class="modal-content">
                        <h3 id="modal-title">Tambah Paket Soal</h3>
                        <form id="pack-form" class="cms-form">
                            <input type="hidden" id="pack-id" />
                            <div class="form-group">
                                <label for="pack-name">Nama Paket</label>
                                <input
                                    type="text"
                                    id="pack-name"
                                    class="input-field"
                                    required
                                    placeholder="Contoh: TIU Simulasi 1"
                                />
                            </div>
                            <div class="form-group">
                                <label for="pack-duration"
                                    >Durasi (Menit)</label
                                >
                                <input
                                    type="number"
                                    id="pack-duration"
                                    class="input-field"
                                    required
                                    min="1"
                                    placeholder="Contoh: 60"
                                />
                            </div>
                            <!-- ============================================
                                 Subtes chip picker (1-3 toggle) + per-subtes
                                 thresholds. Tidak ada lagi dropdown
                                 Tipe Paket terpisah — jumlah subtes yang
                                 dipilih menentukan berapa form input
                                 passing grade per subtes yang muncul di
                                 bawah. Chip pattern: visually-hidden
                                 <input type="checkbox"> + styled <span>
                                 for chip appearance (lihat .chip rules
                                 di styles.css). Form submission masih
                                 membaca <input name="pack-sub"> checkboxes
                                 persis seperti sebelumnya — tidak ada
                                 perubahan pada kontrak data. Lihat
                                 paket-soal-pack-type-spec.md §2.
                                 ============================================ -->
                            <div class="form-group" id="pack-subtests-group">
                                <label>Subtes yang termasuk dalam paket</label>
                                <div
                                    id="pack-subtests-picker"
                                    class="chip-group"
                                >
                                    <label class="chip">
                                        <input
                                            type="checkbox"
                                            name="pack-sub"
                                            value="TWK"
                                            class="chip__input"
                                        />
                                        <span class="chip__label">TWK</span>
                                    </label>
                                    <label class="chip">
                                        <input
                                            type="checkbox"
                                            name="pack-sub"
                                            value="TIU"
                                            class="chip__input"
                                        />
                                        <span class="chip__label">TIU</span>
                                    </label>
                                    <label class="chip">
                                        <input
                                            type="checkbox"
                                            name="pack-sub"
                                            value="TKP"
                                            class="chip__input"
                                        />
                                        <span class="chip__label">TKP</span>
                                    </label>
                                </div>
                                <small
                                    id="pack-subtests-helper"
                                    class="field-helper"
                                >
                                    Pilih 1-3 subtes untuk paket ini.
                                </small>
                            </div>

                            <!-- Passing grade total dihitung otomatis
                                 sebagai jumlah (sum) dari nilai kelulusan
                                 per subtes di bawah ini, jadi tidak perlu
                                 input terpisah di modal. Server tetap
                                 menerima field passing_grade (untuk
                                 backward compat dengan legacy pack). -->

                            <div class="form-group" id="pack-thresholds-group">
                                <div
                                    style="
                                        display: flex;
                                        justify-content: space-between;
                                        align-items: baseline;
                                        gap: 8px;
                                    "
                                >
                                    <label>Passing Grade per Subtes</label>
                                    <span
                                        id="pack-thresholds-running-total"
                                        style="
                                            font-weight: 600;
                                            color: var(--text);
                                            font-size: 0.95rem;
                                        "
                                    >
                                        Total: 0
                                    </span>
                                </div>
                                <div
                                    id="pack-thresholds-list"
                                    style="
                                        display: flex;
                                        gap: 8px;
                                        flex-direction: column;
                                    "
                                ></div>
                                <small
                                    id="pack-thresholds-helper"
                                    style="
                                        color: var(--text-muted);
                                        font-size: 0.825rem;
                                        margin-top: 4px;
                                    "
                                >
                                    Pilih subtes di atas untuk mengatur nilai
                                    kelulusan per subtes.
                                </small>
                            </div>
                            <div class="modal-buttons">
                                <button
                                    type="button"
                                    class="btn-secondary"
                                    id="close-modal-btn"
                                >
                                    Batal
                                </button>
                                <button type="submit" class="btn-primary">
                                    Simpan
                                </button>
                            </div>
                        </form>
                    </div>
                </dialog>
            </div>
            <footer class="footer">
                Untuk latihan SKD · Made with ♥️ in
                2026
            </footer>
        </div>
        <script src="/js/paket-soal.js"></script>
    </body>
</html>
