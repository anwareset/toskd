<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Kelola Paket Soal</title>
        <link rel="stylesheet" href="/css/tokens.css" />
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
    </head>
    <body>
        <!-- client-side guard (admin-auth-spec.md §7.4) -->
        <script>
          (function () {
            // Fail-open banner shown when server is unreachable. Extracted to
            // helper so both the catch block (network error) AND the 5xx branch
            // can use it. Critical: don't redirect to login on 5xx — user might
            // be authenticated and the server is just temporarily down (Rev. 0.7).
            function showServerDownBanner() {
              const banner = document.createElement("div");
              banner.style.cssText =
                "position:fixed;top:0;left:0;right:0;padding:12px 16px;background:var(--danger);" +
                "color:white;text-align:center;z-index:99999;font-size:0.9rem;";
              banner.innerHTML =
                "⚠️ Server tidak dapat dijangkau. CMS tidak dapat dimuat." +
                " <button onclick=\"location.reload()\" style=\"margin-left:12px;background:white;color:var(--danger);" +
                "border:0;padding:4px 10px;border-radius:4px;cursor:pointer\">Coba lagi</button>";
              document.body.appendChild(banner);
              const main = document.querySelector(".site-wrapper");
              if (main) main.style.visibility = "hidden";
            }
            (async function () {
              try {
                const res = await fetch("/api/admin/me", { credentials: "same-origin" });
                if (res.status === 401) {
                  // Not authenticated → redirect to login
                  const next = encodeURIComponent(window.location.pathname + window.location.search);
                  window.location.replace(`/login.html?next=${next}`);
                } else if (!res.ok) {
                  // 5xx or other server error → fail-open banner, don't trap in login loop
                  showServerDownBanner();
                }
                // 2xx: authenticated, continue
              } catch (err) {
                // Network error → fail-open banner
                showServerDownBanner();
              }
            })();
          })();
        </script>
        <div class="site-wrapper">
            <div class="container container--wide" style="flex: 1">
                <div class="header">
                    <h1 class="app-title">📦 Kelola Paket Soal</h1>
                    <div>
                        <button class="btn-primary" id="add-pack-btn">
                            ➕ Tambah Paket Soal
                        </button>
                        <button
                            class="btn-secondary"
                            onclick="location.href = '/bank-soal.html'"
                        >
                            Kembali
                        </button>
                    </div>
                </div>

                <div id="loading" class="loading-overlay">
                    <div class="spinner"></div>
                </div>

                <table id="pack-table" class="table-condensed" style="display: none">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Paket</th>
                            <th>Durasi (Menit)</th>
                            <th>Passing Grade</th>
                            <th>Jumlah Soal</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="pack-body"></tbody>
                </table>

                <dialog id="pack-modal" class="modal">
                    <div class="modal-content">
                        <h3 id="modal-title">Tambah Paket Soal</h3>
                        <form id="pack-form" class="cms-form">
                            <input type="hidden" id="pack-id" />
                            <div class="form-group">
                                <label for="pack-name">Nama Paket</label>
                                <input
                                    type="text"
                                    id="pack-name"
                                    class="input-field"
                                    required
                                    placeholder="Contoh: TIU Simulasi 1"
                                />
                            </div>
                            <div class="form-group">
                                <label for="pack-duration"
                                    >Durasi (Menit)</label
                                >
                                <input
                                    type="number"
                                    id="pack-duration"
                                    class="input-field"
                                    required
                                    min="1"
                                    placeholder="Contoh: 60"
                                />
                            </div>
                            <div class="form-group">
                                <label for="pack-passing"
                                    >Passing Grade (Skor)</label
                                >
                                <input
                                    type="number"
                                    id="pack-passing"
                                    class="input-field"
                                    required
                                    min="0"
                                    value="85"
                                />
                            </div>
                            <div class="modal-buttons">
                                <button
                                    type="button"
                                    class="btn-secondary"
                                    id="close-modal-btn"
                                >
                                    Batal
                                </button>
                                <button type="submit" class="btn-primary">
                                    Simpan
                                </button>
                            </div>
                        </form>
                    </div>
                </dialog>
            </div>
            <footer class="footer">
                Untuk latihan SKD (Seleksi Kompetensi Dasar) · Made with ♥️ in
                2026
            </footer>
        </div>
        <script src="/js/paket-soal.js"></script>
    </body>
</html>
