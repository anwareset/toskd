<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="/assets/toskd-emoticon.svg" type="image/svg+xml">
    <title>TOSKD</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
    <style>
      /* Login-page specific styles */
      .login-container {
        max-width: 420px;
        margin: 80px auto 0;
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        /* No `flex: 1` — card sizes to its content height. Footer is
           pinned to bottom of the .site-wrapper via `.footer`'s
           `margin-top: auto` in styles.css. */
      }
      .login-form-group {
        margin-bottom: 16px;
      }
      .login-form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }
      .login-error {
        background: var(--danger);
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        display: none;
        font-size: 0.9rem;
      }
      .login-success {
        background: var(--success);
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 16px;
        display: none;
        font-size: 0.9rem;
      }
      .login-back-link {
        text-align: center;
        margin-top: 16px;
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      .login-back-link a {
        color: var(--primary);
        text-decoration: none;
      }
      .login-back-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="site-wrapper">
      <div class="login-container">
        <h1 class="app-title" style="font-size: 1.5rem; margin-bottom: 8px; text-align: center;">
          🔐 Login Admin
        </h1>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px">
          Kelola Bank Soal &amp; Paket Soal latihan SKD
        </p>
        <div id="login-error" class="login-error" role="alert"></div>
        <form id="login-form" class="cms-form">
          <div class="login-form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="input-field"
              required
              autocomplete="username"
              autofocus
            />
          </div>
          <div class="login-form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="input-field"
              required
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="btn-primary" style="width: 100%">
            Login
          </button>
        </form>
        <p class="login-back-link">
          <a href="/">← Kembali ke halaman utama</a>
        </p>
      </div>
      <footer class="footer">
        Untuk latihan SKD · Made with ♥️ in 2026
      </footer>
    </div>
    <script src="/js/login.js"></script>
  </body>
</html>
