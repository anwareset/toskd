<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Detail Paket Soal</title>
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
    </head>
    <body>
        <div class="site-wrapper">
            <div class="container" style="flex: 1">
                <div class="header">
                    <div>
                        <h1 class="app-title" id="pack-title">
                            Detail Paket Soal
                        </h1>
                        <p id="pack-subtitle" style="color: #64748b"></p>
                    </div>
                    <button
                        class="btn-secondary"
                        onclick="location.href = '/paket-soal.html'"
                    >
                        Kembali
                    </button>
                </div>

                <div class="pack-detail-layout">
                    <div>
                        <h3>➕ Tambah Soal dari Bank Soal</h3>
                        <div id="loading-bank" class="loading-overlay">
                            <div class="spinner"></div>
                        </div>

                        <!-- Top Controls -->
                        <div
                            id="bank-controls-top"
                            class="pagination-bar pagination-bar--precise"
                            style="display: none"
                        >
                            <div class="pagination-bar-left">
                                <label
                                    for="bank-rows-per-page-top"
                                    class="pagination-label"
                                >
                                    Tampilkan:
                                </label>
                                <select
                                    id="bank-rows-per-page-top"
                                    class="pagination-select"
                                >
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                                <span class="pagination-text">baris</span>
                            </div>
                            <div class="pagination-bar-center">
                                <input
                                    type="text"
                                    id="bank-search-input"
                                    class="pagination-search"
                                    placeholder="Cari soal..."
                                />
                            </div>
                            <div class="pagination-bar-right">
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-prev-btn-top"
                                >
                                    Sebelumnya
                                </button>
                                <span
                                    id="bank-page-info-top"
                                    class="pagination-info"
                                >
                                    Halaman 1 dari 1
                                </span>
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-next-btn-top"
                                >
                                    Selanjutnya
                                </button>
                            </div>
                        </div>

                        <div
                            id="bank-questions-list"
                            class="bank-list-container"
                        ></div>

                        <!-- Bottom Controls -->
                        <div
                            id="bank-controls-bottom"
                            class="pagination-bar pagination-bar--bottom pagination-bar--precise"
                            style="display: none"
                        >
                            <div class="pagination-bar-left">
                                <label
                                    for="bank-rows-per-page-bottom"
                                    class="pagination-label"
                                >
                                    Tampilkan:
                                </label>
                                <select
                                    id="bank-rows-per-page-bottom"
                                    class="pagination-select"
                                >
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                            <div class="pagination-bar-right">
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-prev-btn-bottom"
                                >
                                    Sebelumnya
                                </button>
                                <span
                                    id="bank-page-info-bottom"
                                    class="pagination-info"
                                >
                                    Halaman 1 dari 1
                                </span>
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-next-btn-bottom"
                                >
                                    Selanjutnya
                                </button>
                            </div>
                        </div>

                        <button
                            class="btn-primary"
                            id="add-to-pack-btn"
                            style="margin-top: 16px; width: 100%"
                        >
                            Masukkan Soal Terpilih ke Paket
                        </button>
                    </div>

                    <div>
                        <h3>📋 Soal dalam Paket (Urutan pengerjaan)</h3>
                        <p
                            style="
                                color: #64748b;
                                font-size: 0.85rem;
                                margin-bottom: 12px;
                            "
                        >
                            Tarik & lepas (Drag & Drop) item untuk mengatur
                            urutan soal
                        </p>
                        <div id="loading-pack" class="loading-overlay">
                            <div class="spinner"></div>
                        </div>
                        <div
                            id="pack-questions-list"
                            style="
                                min-height: 200px;
                                background: var(--bg);
                                border: 1px solid var(--border);
                                border-radius: 8px;
                                padding: 8px;
                            "
                        ></div>
                        <button
                            class="btn-success"
                            id="save-order-btn"
                            style="margin-top: 16px; width: 100%"
                            disabled
                        >
                            Simpan Urutan Soal
                        </button>
                    </div>
                </div>
            </div>
            <footer class="footer">
                Untuk latihan SKD (Seleksi Kompetensi Dasar) · Made with ♥️ in
                2026
            </footer>
        </div>
        <script src="/js/paket-detail.js"></script>
    </body>
</html>
