<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <link rel="icon" href="/assets/toskd-emoticon.svg" type="image/svg+xml">
        <title>TOSKD Detail Paket</title>
        <link rel="stylesheet" href="/css/tokens.css" />
        <link rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
        <!-- MathJax for rendering LaTeX math formulas in question content
             previews. Async so it doesn't block initial render; typeset
             calls in paket-detail.js queue work via MathJax.typesetPromise
             which resolves once MathJax finishes loading. Mirrors the
             pattern in kelola-soal.html. -->
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
            async
        ></script>
    </head>
    <body>
        <!-- client-side guard (admin-auth-spec.md §7.4) -->
        <script>
          (function () {
            // Fail-open banner shown when server is unreachable. Extracted to
            // helper so both the catch block (network error) AND the 5xx branch
            // can use it. Critical: don't redirect to login on 5xx — user might
            // be authenticated and the server is just temporarily down (Rev. 0.7).
            function showServerDownBanner() {
              const banner = document.createElement("div");
              banner.style.cssText =
                "position:fixed;top:0;left:0;right:0;padding:12px 16px;background:var(--danger);" +
                "color:white;text-align:center;z-index:99999;font-size:0.9rem;";
              banner.innerHTML =
                "⚠️ Server tidak dapat dijangkau. CMS tidak dapat dimuat." +
                " <button onclick=\"location.reload()\" style=\"margin-left:12px;background:white;color:var(--danger);" +
                "border:0;padding:4px 10px;border-radius:4px;cursor:pointer\">Coba lagi</button>";
              document.body.appendChild(banner);
              const main = document.querySelector(".site-wrapper");
              if (main) main.style.visibility = "hidden";
            }
            (async function () {
              try {
                const res = await fetch("/api/admin/me", { credentials: "same-origin" });
                if (res.status === 401) {
                  // Not authenticated → redirect to login
                  const next = encodeURIComponent(window.location.pathname + window.location.search);
                  window.location.replace(`/login.html?next=${next}`);
                } else if (!res.ok) {
                  // 5xx or other server error → fail-open banner, don't trap in login loop
                  showServerDownBanner();
                }
                // 2xx: authenticated, continue
              } catch (err) {
                // Network error → fail-open banner
                showServerDownBanner();
              }
            })();
          })();
        </script>
        <div class="site-wrapper">
            <div class="container container--wide" style="flex: 1">
                <div class="header">
                    <div>
                        <h1 class="app-title" id="pack-title">
                            Detail Paket Soal
                        </h1>
                        <p id="pack-subtitle" style="color: var(--text-muted)"></p>
                    </div>
                    <button
                        class="btn-secondary"
                        onclick="location.href = '/paket-soal.html'"
                    >
                        Kembali
                    </button>
                </div>

                <div class="pack-detail-layout">
                    <div style="position: relative">
                        <h3>➕ Tambah Soal dari Bank Soal</h3>
                        <!-- Add-to-pack loading overlay. Absolute-positioned
                             over the bank panel (CSS #loading-add rule) so
                             it dims every bank-side control during the POST
                             loop. See paket-detail-add-to-pack-polish-spec.md
                             §4.5–4.6. -->
                        <div
                            id="loading-add"
                            class="loading-overlay"
                            role="status"
                            aria-live="polite"
                            aria-label="Memasukkan soal"
                            style="display: none"
                        >
                            <div class="spinner"></div>
                        </div>
                        <div id="loading-bank" class="loading-overlay">
                            <div class="spinner"></div>
                        </div>

                        <!-- Top Controls -->
                        <div
                            id="bank-controls-top"
                            class="pagination-bar pagination-bar--precise"
                            style="display: none"
                        >
                            <div class="pagination-bar-left">
                                <label
                                    for="bank-rows-per-page-top"
                                    class="pagination-label"
                                >
                                    Tampilkan:
                                </label>
                                <select
                                    id="bank-rows-per-page-top"
                                    class="pagination-select"
                                >
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                                <span class="pagination-text">baris</span>
                            </div>
                            <div class="pagination-bar-center">
                                <input
                                    type="text"
                                    id="bank-search-input"
                                    class="pagination-search"
                                    placeholder="Cari soal..."
                                />
                            </div>
                            <div class="pagination-bar-right">
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-prev-btn-top"
                                >
                                    Sebelumnya
                                </button>
                                <span
                                    id="bank-page-info-top"
                                    class="pagination-info"
                                >
                                    Halaman 1 dari 1
                                </span>
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-next-btn-top"
                                >
                                    Selanjutnya
                                </button>
                            </div>
                        </div>

                        <div
                            id="bank-questions-list"
                            class="bank-list-container"
                        ></div>

                        <!-- Bottom Controls -->
                        <div
                            id="bank-controls-bottom"
                            class="pagination-bar pagination-bar--bottom pagination-bar--precise"
                            style="display: none"
                        >
                            <div class="pagination-bar-left">
                                <label
                                    for="bank-rows-per-page-bottom"
                                    class="pagination-label"
                                >
                                    Tampilkan:
                                </label>
                                <select
                                    id="bank-rows-per-page-bottom"
                                    class="pagination-select"
                                >
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                            <div class="pagination-bar-right">
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-prev-btn-bottom"
                                >
                                    Sebelumnya
                                </button>
                                <span
                                    id="bank-page-info-bottom"
                                    class="pagination-info"
                                >
                                    Halaman 1 dari 1
                                </span>
                                <button
                                    class="btn-secondary pagination-btn"
                                    id="bank-next-btn-bottom"
                                >
                                    Selanjutnya
                                </button>
                            </div>
                        </div>

                        <button
                            class="btn-primary"
                            id="add-to-pack-btn"
                            style="margin-top: 16px; width: 100%"
                        >
                            Masukkan Soal Terpilih ke Paket
                        </button>
                    </div>

                    <div>
                        <h3>📋 Soal dalam Paket (Urutan pengerjaan)</h3>
                        <p
                            style="
                            color: var(--text-muted);
                            font-size: 0.85rem;
                                margin-bottom: 12px;
                            "
                        >
                            Tarik & lepas (Drag & Drop) item untuk mengatur
                            urutan soal
                        </p>
                        <div id="loading-pack" class="loading-overlay">
                            <div class="spinner"></div>
                        </div>
                        <div
                            id="pack-questions-list"
                            style="
                                min-height: 200px;
                                background: var(--bg);
                                border: 1px solid var(--border);
                                border-radius: 8px;
                                padding: 8px;
                            "
                        ></div>
                        <button
                            class="btn-success"
                            id="save-order-btn"
                            style="margin-top: 16px; width: 100%"
                            disabled
                        >
                            Simpan Urutan Soal
                        </button>
                    </div>
                </div>
            </div>
            <footer class="footer">
                Untuk latihan SKD · Made with ♥️ in
                2026
            </footer>
        </div>
        <script type="module" src="/js/bulk-parser.js"></script>
        <script defer src="/js/paket-detail.js"></script>
    </body>
</html>
