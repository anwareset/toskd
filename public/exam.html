<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Ujian - CAT SKD</title>
        <link rel="stylesheet" href="/css/tokens.css" />
        <link class="styles" rel="stylesheet" href="/css/styles.css" />
        <script src="/js/theme.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
            async
        ></script>
    </head>
    <body>
        <div class="exam-header">
            <h2 id="pack-name">Memuat...</h2>
            <div class="timer" id="timer">--:--</div>
            <button class="btn-danger" id="end-exam-btn">
                🛑 Akhiri Ujian
            </button>
        </div>
        <div class="exam-layout">
            <section class="exam-question-section">
                <div class="question-container">
                    <div class="question-no" id="question-no">Soal 1</div>
                    <div class="question-content" id="question-content"></div>
                    <div id="options-container"></div>
                    <div class="question-nav">
                        <button class="btn-secondary" id="prev-btn">
                            ← Sebelumnya
                        </button>
                        <span id="q-counter" style="color: var(--text-muted)">1/1</span>
                        <button class="btn-secondary" id="next-btn">
                            Selanjutnya →
                        </button>
                    </div>
                </div>
            </section>
            <aside class="answer-panel">
                <h3>📋 Lembar Jawaban</h3>
                <div class="answer-grid" id="answer-grid"></div>
            </aside>
        </div>
        <footer class="footer">
            Untuk latihan SKD (Seleksi Kompetensi Dasar) · Made with ♥️ in 2026
        </footer>
        <script src="/js/exam.js"></script>
    </body>
</html>
